<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study 003 — Context Engineering Under Recording</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Geist+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/gh/snd-lib/snd-lib@v1.2.4/dist/browser/snd.js?kit=01"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0A0A0A; color: #E0E0E0;
    font-family: 'DM Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden; width: 100vw; height: 100vh;
  }
  .film { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; }

  /* ── TOP: TERMINAL DEMO ──────────────────── */
  .demo-area {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 60px 48px 24px; position: relative;
  }

  /* Terminal blocks — surface step on canonical surface, no parallel "cold" palette */
  .term {
    background: #141414; border-radius: 6px;
    width: 100%; max-width: 960px; overflow: hidden;
    position: absolute; opacity: 0; transition: opacity 0.6s ease;
    pointer-events: none;
  }
  .term.active { opacity: 1; pointer-events: auto; }

  .term-bar {
    display: flex; align-items: center; gap: 8px; padding: 14px 18px;
    background: #1E1E22;
  }
  .term-dot { width: 10px; height: 10px; border-radius: 50%; }
  .term-title { font-family: 'Geist Mono', monospace; font-size: 12px; color: #999999; margin-left: 12px; }
  .term-body { padding: 24px 28px; font-family: 'Geist Mono', monospace; font-size: 15px; line-height: 2.2; }
  .term-line { opacity: 0; transform: translateY(4px); transition: opacity 0.3s, transform 0.3s; }
  .term-line.show { opacity: 1; transform: translateY(0); }

  /* Terminal colors — canonical tokens only. Editorial accent for prompt/caret/tool;
     axis gray for paths/output/comments; semantic green/red/gold for state. */
  .t-prompt { color: #D4574A; }
  .t-path { color: #999999; }
  .t-caret { color: #D4574A; }
  .t-cmd { color: #E0E0E0; }
  .t-dim { color: #999999; }
  .t-out { color: #999999; }
  .t-ok { color: #4ADE80; }
  .t-red { color: #EF4444; }
  .t-warn { color: #D4A843; }
  .t-tool { color: #D4574A; }
  .t-comment { color: #999999; font-style: italic; }

  .t-leaked {
    color: #EF4444;
    background: rgba(239, 68, 68, 0.12);
    padding: 1px 4px; border-radius: 2px;
  }

  /* Title cards — canonical surface, editorial typography */
  .title-card {
    position: absolute; text-align: center;
    opacity: 0; transition: opacity 0.8s ease;
  }
  .title-card.active { opacity: 1; }
  .title-mono { font-family: 'Geist Mono', monospace; font-size: 14px; color: #999999; letter-spacing: 0.12em; margin-bottom: 24px; }
  .title-big { font-size: 56px; font-weight: 700; color: #E0E0E0; line-height: 1.2; letter-spacing: -0.03em; }
  .title-big .sub { font-size: 28px; font-weight: 400; color: #999999; margin-top: 16px; display: block; }
  .title-mid { font-size: 36px; font-weight: 600; color: #E0E0E0; line-height: 1.3; letter-spacing: -0.02em; max-width: 800px; }
  .title-quote { font-size: 44px; font-weight: 500; color: #E0E0E0; line-height: 1.3; letter-spacing: -0.02em; font-style: italic; max-width: 800px; }

  .line-reveal { opacity: 0; transform: translateY(10px); transition: opacity 0.5s ease, transform 0.5s ease; }
  .line-reveal.show { opacity: 1; transform: translateY(0); }

  /* Recording badge */
  .rec-badge {
    position: fixed; top: 24px; right: 32px;
    font-family: 'Geist Mono', monospace; font-size: 12px; color: #EF4444;
    letter-spacing: 0.1em; display: flex; align-items: center; gap: 8px;
    opacity: 0; transition: opacity 0.5s ease; z-index: 50;
  }
  .rec-badge.show { opacity: 1; }
  .rec-dot { width: 8px; height: 8px; border-radius: 50%; background: #EF4444; animation: blink 1.5s infinite; }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* ── BOTTOM: NARRATION ───────────────────── */
  .narration-area {
    height: 160px; flex-shrink: 0;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    padding: 16px 48px 48px; text-align: center;
    background: #141414;
  }

  .narration-label {
    font-family: 'Geist Mono', monospace; font-size: 12px; color: #999999;
    letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 16px;
    opacity: 0; transition: opacity 0.3s ease;
  }
  .narration-label.show { opacity: 1; }

  .narration-text {
    font-size: 24px; font-weight: 600; color: #E0E0E0;
    line-height: 1.4; max-width: 900px;
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .narration-text.show { opacity: 1; transform: translateY(0); }
  .narration-text .hi { color: #D4A843; }
  .narration-text .red { color: #EF4444; }

  /* ── PLAYER BAR ──────────────────────────── */
  .progress-bar { position: fixed; bottom: 0; left: 0; height: 3px; background: #D4A843; z-index: 100; transition: width 0.3s linear; }
  .counter { position: fixed; bottom: 24px; right: 32px; font-family: 'Geist Mono', monospace; font-size: 14px; color: #999999; letter-spacing: 0.06em; z-index: 100; }
  .audio-toggle {
    position: fixed; top: 24px; left: 32px; z-index: 120;
    font-family: 'Geist Mono', monospace; font-size: 12px; color: #999999;
    background: #141414; border: none; border-radius: 999px;
    padding: 10px 14px; letter-spacing: 0.1em; cursor: pointer;
    transition: background 0.2s ease, color 0.2s ease;
  }
  .audio-toggle.on { background: #D4574A; color: #E0E0E0; }

  html.autoplay .start-screen { display: none !important; }
  html.autoplay .audio-toggle { display: none !important; }
  html.autoplay .rec-badge { display: none !important; }
  html.autoplay .counter { display: none !important; }

  /* ── START SCREEN ────────────────────────── */
  .start-screen {
    position: fixed; inset: 0; z-index: 200;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #0A0A0A; cursor: pointer; transition: opacity 0.8s ease;
  }
  .start-screen.hidden { opacity: 0; pointer-events: none; }
  .play-btn {
    width: 100px; height: 100px; border-radius: 50%;
    background: #1E1E22;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 40px; transition: background 0.3s, transform 0.3s;
  }
  .start-screen:hover .play-btn { background: #D4574A; transform: scale(1.05); }
  .play-btn svg { margin-left: 6px; }
  .start-label { font-family: 'Geist Mono', monospace; font-size: 14px; color: #999999; letter-spacing: 0.12em; }
</style>
</head>
<body>
<script>if(location.search.includes('autoplay'))document.documentElement.classList.add('autoplay')</script>

<div class="start-screen" id="startScreen" onclick="startFilm()">
  <div class="start-label" style="margin-bottom:32px">STUDY 003</div>
  <div class="play-btn"><svg width="32" height="32" viewBox="0 0 24 24" fill="none"><path d="M8 5v14l11-7L8 5z" fill="#E0E0E0"/></svg></div>
  <div class="start-label">PRESS TO PLAY</div>
</div>

<button class="audio-toggle" id="audioToggle" onclick="toggleAudio()">VOICE OFF</button>
<div class="rec-badge" id="recBadge"><div class="rec-dot"></div>REC</div>

<div class="film">
  <div class="demo-area">
    <!-- Title cards and terminal blocks go here -->
  </div>

  <div class="narration-area">
    <div class="narration-label" id="nLabel"></div>
    <div class="narration-text" id="nText"></div>
  </div>
</div>

<div class="progress-bar" id="progressBar"></div>
<div class="counter" id="counter"></div>

<script>
var snd = new Snd(); snd.load(Snd.KITS.SND01);
var audioEnabled = false;
var narrationTrack = new Audio('narration.mp3');
narrationTrack.preload = 'auto';

var scenes = [
  // Replace with scene config
];

var current = -1, running = false;
var total = scenes.length;

function toggleAudio() {
  audioEnabled = !audioEnabled;
  var btn = document.getElementById('audioToggle');
  btn.textContent = audioEnabled ? 'VOICE ON' : 'VOICE OFF';
  btn.classList.toggle('on', audioEnabled);
  if (audioEnabled && running) narrationTrack.play().catch(function(){});
  else narrationTrack.pause();
}

function startNarration() {
  if (!audioEnabled) return;
  narrationTrack.currentTime = 0;
  narrationTrack.play().catch(function(){});
}

function clearAll() {
  document.querySelectorAll('.term').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.title-card').forEach(function(t) { t.classList.remove('active'); });
}

function showNarr(label, html) {
  var nl = document.getElementById('nLabel');
  var nt = document.getElementById('nText');
  nl.classList.remove('show'); nt.classList.remove('show');
  setTimeout(function() {
    nl.textContent = label || '';
    nt.innerHTML = html || '';
    if (label) nl.classList.add('show');
    if (html) nt.classList.add('show');
  }, 200);
}

function startFilm() {
  document.getElementById('startScreen').classList.add('hidden');
  audioEnabled = true;
  var btn = document.getElementById('audioToggle');
  btn.textContent = 'VOICE ON';
  btn.classList.add('on');
  running = true; startNarration(); nextScene();
}

function nextScene() {
  if (!running) return;
  clearAll();
  current++;
  if (current >= total) { running = false; narrationTrack.pause(); showNarr('',''); return; }
  var s = scenes[current];
  document.getElementById('counter').textContent = String(current+1).padStart(2,'0')+'/'+String(total).padStart(2,'0');
  document.getElementById('progressBar').style.width = ((current+1)/total*100)+'%';

  if (current >= 1) document.getElementById('recBadge').classList.add('show');

  try { snd.play(Snd.SOUNDS.TRANSITION_UP,{volume:0.35}); } catch(e) {}
  if (s.sound === 'caution') try { setTimeout(function() { snd.play(Snd.SOUNDS.CAUTION); }, 300); } catch(e) {}
  if (s.sound === 'notification') try { setTimeout(function() { snd.play(Snd.SOUNDS.NOTIFICATION); }, 300); } catch(e) {}
  if (s.sound === 'celebration') try { setTimeout(function() { snd.play(Snd.SOUNDS.CELEBRATION); }, 300); } catch(e) {}

  showNarr(s.label, s.narr);

  if (s.title) {
    var tc = document.getElementById(s.title);
    tc.classList.add('active');
    tc.querySelectorAll('.line-reveal').forEach(function(r,i) {
      setTimeout(function() { r.classList.add('show'); try { snd.play(Snd.SOUNDS.TAP,{volume:0.2}); } catch(e) {} }, 300+i*500);
    });
  }

  if (s.term) {
    var term = document.getElementById(s.term);
    term.classList.add('active');
    var b = document.getElementById(s.tb); b.innerHTML = '';
    s.lines.forEach(function(l,i) {
      var d = document.createElement('div');
      d.className = 'term-line';
      d.innerHTML = l || '&nbsp;';
      b.appendChild(d);
      setTimeout(function() {
        d.classList.add('show');
        if (l) try { snd.play(Snd.SOUNDS.TYPE,{volume:0.25}); } catch(e) {}
      }, 600+i*600);
    });
  }

  setTimeout(nextScene, s.dur);
}

document.addEventListener('keydown', function(e) {
  if (e.code==='Space') {
    e.preventDefault();
    if (current<0) startFilm();
    else {
      running = !running;
      if (audioEnabled && running) narrationTrack.play().catch(function(){});
      else narrationTrack.pause();
      if (running) nextScene();
    }
  }
  if (e.code==='ArrowRight' || e.code==='PageDown') {
    e.preventDefault();
    if (current<0) startFilm();
    else { running = false; narrationTrack.pause(); current--; nextScene(); running = false; }
  }
  if ((e.code==='ArrowLeft' || e.code==='PageUp') && current > 0) {
    e.preventDefault();
    running = false; narrationTrack.pause(); current -= 2; nextScene(); running = false;
  }
});

if (window.location.search.includes('autoplay')) {
  document.getElementById('startScreen').style.display = 'none';
  setTimeout(function() { running = true; nextScene(); }, 500);
}
</script>
</body>
</html>
